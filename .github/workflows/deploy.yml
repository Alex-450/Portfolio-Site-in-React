name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  schedule:
    # Run daily at 6 AM UTC (7 AM CET / 8 AM CEST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore TMDB cache
        uses: actions/cache/restore@v5
        with:
          path: src/data/tmdb-cache.json
          key: tmdb-cache-${{ hashFiles('src/data/tmdb-cache.json') }}
          restore-keys: |
            tmdb-cache-

      - name: Restore Eye cache
        uses: actions/cache/restore@v5
        with:
          path: src/data/eye-cache.json
          key: eye-cache-${{ hashFiles('src/data/eye-cache.json') }}
          restore-keys: |
            eye-cache-

      # Restore films.json from a previous run. The restore key is based on a hash of the
      # scripts directory so that pushes that don't change scraper logic reuse the last
      # fetched result. The save key appends run_id to avoid the "cache already exists"
      # collision that occurs when the scripts hash hasn't changed between runs.
      - name: Restore films.json cache
        id: cache-films
        uses: actions/cache/restore@v5
        with:
          path: src/data/films.json
          key: films-json-${{ hashFiles('scripts/**') }}
          restore-keys: |
            films-json-

      # Only fetch fresh showtimes on schedule/manual runs, or on push when scraper
      # files have changed (i.e. no exact cache hit on the scripts hash).
      - name: Fetch showtimes
        id: fetch-showtimes
        if: ${{ github.event_name != 'push' || steps.cache-films.outputs.cache-hit != 'true' }}
        run: npm run fetch-showtimes
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          CF_SCRAPER_TOKEN: ${{ secrets.CF_SCRAPER_TOKEN }}

      - name: Save TMDB cache
        if: ${{ steps.fetch-showtimes.outcome == 'success' }}
        uses: actions/cache/save@v5
        with:
          path: src/data/tmdb-cache.json
          key: tmdb-cache-${{ github.run_id }}

      - name: Save Eye cache
        if: ${{ steps.fetch-showtimes.outcome == 'success' }}
        uses: actions/cache/save@v5
        with:
          path: src/data/eye-cache.json
          key: eye-cache-${{ github.run_id }}

      - name: Save films.json cache
        if: ${{ steps.fetch-showtimes.outcome == 'success' }}
        uses: actions/cache/save@v5
        with:
          path: src/data/films.json
          # Append run_id so each run gets a unique save key — GitHub Actions doesn't
          # allow overwriting an existing cache entry, so without this the save silently
          # fails on every run after the first with the same scripts hash.
          key: films-json-${{ hashFiles('scripts/**') }}-${{ github.run_id }}

      - name: Notify on scraper failures
        if: ${{ hashFiles('failed-cinemas.txt') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FAILED=$(cat failed-cinemas.txt)
          gh issue create \
            --title "Scraper failure: $FAILED" \
            --body "The following scrapers failed during the [daily build](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}):"$'\n\n'"$FAILED"$'\n\n'"Cached data was used as a fallback." \
            --label "scraper-failure"

      - name: Cache Next.js
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Build
        run: npm run build:only

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
