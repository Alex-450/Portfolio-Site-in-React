name: Test Scraper

on:
  push:
    branches-ignore:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache TMDB data
        uses: actions/cache@v5
        with:
          path: src/data/tmdb-cache.json
          key: tmdb-cache-${{ hashFiles('scripts/scrapers/tmdb.mjs') }}

      - name: Cache Eye data
        uses: actions/cache@v5
        with:
          path: src/data/eye-cache.json
          key: eye-cache-${{ hashFiles('scripts/scrapers/eye.mjs') }}

      - name: Fetch showtimes
        run: npm run fetch-showtimes
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
